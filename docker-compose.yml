services:
  db:
    image: postgres:15-alpine
    container_name: vertex_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: meeting_ai_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/meeting_ai_system?schema=public
    depends_on:
      - db
    # To scale: docker-compose up --scale backend=3
    deploy:
      replicas: 1

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: vertex_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
